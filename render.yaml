services:
  - type: web
    name: globalreach
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node dist/index.cjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
    # NOTE: No `disk:` block — Render's free tier does not support persistent
    # disks, and declaring one fails the deploy. The app writes its SQLite DB to
    # /tmp on Render (see server/storage.ts), so no persistent disk is needed.
    # Caveat: /tmp is ephemeral — data resets on each redeploy/restart. Upgrade
    # to a paid plan + re-add a disk (or move to Postgres) for durable storage.
